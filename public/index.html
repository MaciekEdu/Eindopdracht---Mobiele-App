<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Calorieënteller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <h1 data-key="title">Calorieënteller</h1>
    <nav>
      <button class="nav-btn" data-view="dashboard" data-key="navDashboard">Dashboard</button>
      <button class="nav-btn" data-view="add" data-key="navAdd">Toevoegen</button>
      <button class="nav-btn" data-view="overview" data-key="navOverview">Overzicht</button>
    </nav>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="dashboard" class="view">
      <h2 data-key="dashTitle">Overzicht vandaag</h2>
      <p data-key="dashTotal">Totaal kcal vandaag:</p>
      <p id="total-today">0</p>
    </section>

    <!-- TOEVOEGEN -->
    <section id="add" class="view hidden">
      <h2 data-key="addTitle">Nieuwe invoer</h2>
      <form id="entry-form">
        <label>
          <span data-key="labelDate">Datum</span>
          <input type="date" id="date" required>
        </label>

        <label>
          <span data-key="labelCategory">Categorie</span>
          <select id="category" required>
            <option value="Ontbijt">Ontbijt</option>
            <option value="Lunch">Lunch</option>
            <option value="Diner">Diner</option>
            <option value="Snack">Snack</option>
            <option value="Drinken">Drinken</option>
          </select>
        </label>

        <label>
          <span data-key="labelDescription">Omschrijving</span>
          <input type="text" id="description" required>
        </label>

        <label>
          <span data-key="labelCalories">Kcal</span>
          <input type="number" id="calories" min="0" required>
        </label>

        <button type="submit" data-key="btnSave">Opslaan</button>
      </form>
    </section>

    <!-- OVERZICHT -->
    <section id="overview" class="view hidden">
      <h2 data-key="overviewTitle">Overzicht</h2>

      <div class="filters">
        <label>
          <span data-key="labelPeriod">Periode</span>
          <select id="period">
            <option value="day" data-key="optDay">Dag</option>
            <option value="week" data-key="optWeek">Week</option>
            <option value="month" data-key="optMonth">Maand</option>
          </select>
        </label>

        <label>
          <span data-key="labelFilterDate">Datum</span>
          <input type="date" id="filter-date">
        </label>

        <button id="apply-filter" data-key="btnFilter">Filter</button>
      </div>

      <ul id="entries-list"></ul>
    </section>
  </main>

  <footer>
    <button id="lang-nl">NL</button>
    <button id="lang-en">EN</button>
  </footer>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("js/service-worker.js");
    }
  </script>
</body>
</html>
